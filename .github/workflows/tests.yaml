name: Tests

on:
  push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.22

    - name: Build
      run: go build -v ./...

    # - name: Run tests
    #   run: |
    #     make tests
    #     ./build/test-server &
    #     go test -v ./...

    - name: Lint source code
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.0
        args: --timeout=5m
        skip-cache: true
        working-directory: plugin-go

    - name: Display lint results
      run: golangci-lint run
      shell: bash

